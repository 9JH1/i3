[general]
import = ['~/.config/i3/conf/alacritty-padding.toml']

[window]
decorations="full"
dynamic_title=true
opacity = 0.9
dynamic_padding = true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#0d0d0f"
foreground = "#c2c2c3"

[colors.cursor]
text = "#0d0d0f"
cursor = "#c2c2c3"

[colors.vi_mode_cursor]
text = "#0d0d0f"
cursor = "#c2c2c3"

[colors.search.matches]
foreground = "#0d0d0f"
background = "#c2c2c3"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#58586b"
background = "#c2c2c3"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#0d0d0f"
red = "#515071"
green = "#605B70"
yellow = "#B86670"
blue = "#555A83"
magenta = "#686983"
cyan = "#CA7682"
white = "#c2c2c3"

[colors.bright]
black = "#58586b"
red = "#515071"
green = "#605B70"
yellow = "#B86670"
blue = "#555A83"
magenta = "#686983"
cyan = "#CA7682"
white = "#c2c2c3"

[colors.dim]
black = "#c2c2c3"
red = "#515071"
green = "#686983"
yellow = "#B86670"
blue = "#555A83"
magenta = "#605B70"
cyan = "#CA7682"
white = "#58586b"
