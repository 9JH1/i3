[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#131819"
foreground = "#feffff"

[colors.cursor]
text = "#131819"
cursor = "#feffff"

[colors.vi_mode_cursor]
text = "#131819"
cursor = "#feffff"

[colors.search.matches]
foreground = "#131819"
background = "#feffff"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#283335"
background = "#c4c5c5"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#131819"
red = "#95B6D3"
green = "#6C8EA5"
yellow = "#D1C2A7"
blue = "#4188BC"
magenta = "#9AA2A6"
cyan = "#63A2D1"
white = "#c4c5c5"

[colors.bright]
black = "#283335"
red = "#aaeeff"
green = "#7abce8"
yellow = "#ffffc0"
blue = "#44b3ff"
magenta = "#b3d9ec"
cyan = "#6cd5ff"
white = "#feffff"

[colors.dim]
black = "#feffff"
red = "#aaeeff"
green = "#b3d9ec"
yellow = "#ffffc0"
blue = "#44b3ff"
magenta = "#7abce8"
cyan = "#6cd5ff"
white = "#283335"
