[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 20

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#151321"
foreground = "#c4c4c7"

[colors.cursor]
text = "#151321"
cursor = "#c4c4c7"

[colors.vi_mode_cursor]
text = "#151321"
cursor = "#c4c4c7"

[colors.search.matches]
foreground = "#151321"
background = "#c4c4c7"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#615e74"
background = "#c4c4c7"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#151321"
red = "#CD3564"
green = "#A44F6F"
yellow = "#D65775"
blue = "#7B6983"
magenta = "#A16E89"
cyan = "#E86E8C"
white = "#c4c4c7"

[colors.bright]
black = "#615e74"
red = "#CD3564"
green = "#A44F6F"
yellow = "#D65775"
blue = "#7B6983"
magenta = "#A16E89"
cyan = "#E86E8C"
white = "#c4c4c7"

[colors.dim]
black = "#c4c4c7"
red = "#CD3564"
green = "#A16E89"
yellow = "#D65775"
blue = "#7B6983"
magenta = "#A44F6F"
cyan = "#E86E8C"
white = "#615e74"
