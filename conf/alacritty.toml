[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 20

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#181818"
foreground = "#c5c5c5"

[colors.cursor]
text = "#181818"
cursor = "#c5c5c5"

[colors.vi_mode_cursor]
text = "#181818"
cursor = "#c5c5c5"

[colors.search.matches]
foreground = "#181818"
background = "#c5c5c5"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#725d5d"
background = "#c5c5c5"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#181818"
red = "#699B6A"
green = "#D69821"
yellow = "#998E72"
blue = "#437E80"
magenta = "#458588"
cyan = "#BAAE90"
white = "#c5c5c5"

[colors.bright]
black = "#725d5d"
red = "#699B6A"
green = "#D69821"
yellow = "#998E72"
blue = "#437E80"
magenta = "#458588"
cyan = "#BAAE90"
white = "#c5c5c5"

[colors.dim]
black = "#c5c5c5"
red = "#699B6A"
green = "#458588"
yellow = "#998E72"
blue = "#437E80"
magenta = "#D69821"
cyan = "#BAAE90"
white = "#725d5d"
