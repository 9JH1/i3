[general]
import = ['~/.config/i3/conf/alacritty-padding.toml']

[window]
decorations="full"
dynamic_title=true
opacity = 0.9
dynamic_padding = true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#12150f"
foreground = "#c3c4c3"

[colors.cursor]
text = "#12150f"
cursor = "#c3c4c3"

[colors.vi_mode_cursor]
text = "#12150f"
cursor = "#c3c4c3"

[colors.search.matches]
foreground = "#12150f"
background = "#c3c4c3"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#616e5a"
background = "#c3c4c3"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#12150f"
red = "#937447"
green = "#728562"
yellow = "#9A916F"
blue = "#DA9246"
magenta = "#65A296"
cyan = "#AAA290"
white = "#c3c4c3"

[colors.bright]
black = "#616e5a"
red = "#937447"
green = "#728562"
yellow = "#9A916F"
blue = "#DA9246"
magenta = "#65A296"
cyan = "#AAA290"
white = "#c3c4c3"

[colors.dim]
black = "#c3c4c3"
red = "#937447"
green = "#65A296"
yellow = "#9A916F"
blue = "#DA9246"
magenta = "#728562"
cyan = "#AAA290"
white = "#616e5a"
