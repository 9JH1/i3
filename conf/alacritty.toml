[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#060206"
foreground = "#c0bfc0"

[colors.cursor]
text = "#060206"
cursor = "#c0bfc0"

[colors.vi_mode_cursor]
text = "#060206"
cursor = "#c0bfc0"

[colors.search.matches]
foreground = "#060206"
background = "#c0bfc0"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#645264"
background = "#c0bfc0"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#060206"
red = "#E85E2C"
green = "#C0662A"
yellow = "#63B036"
blue = "#B49F39"
magenta = "#EAA859"
cyan = "#9DD864"
white = "#c0bfc0"

[colors.bright]
black = "#645264"
red = "#E85E2C"
green = "#C0662A"
yellow = "#63B036"
blue = "#B49F39"
magenta = "#EAA859"
cyan = "#9DD864"
white = "#c0bfc0"

[colors.dim]
black = "#c0bfc0"
red = "#E85E2C"
green = "#EAA859"
yellow = "#63B036"
blue = "#B49F39"
magenta = "#C0662A"
cyan = "#9DD864"
white = "#645264"
