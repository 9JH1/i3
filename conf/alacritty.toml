[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#100f1c"
foreground = "#c3c3c6"

[colors.cursor]
text = "#100f1c"
cursor = "#c3c3c6"

[colors.vi_mode_cursor]
text = "#100f1c"
cursor = "#c3c3c6"

[colors.search.matches]
foreground = "#100f1c"
background = "#c3c3c6"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#5c5c71"
background = "#c3c3c6"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#100f1c"
red = "#665C97"
green = "#7F71A4"
yellow = "#AA6B9E"
blue = "#D87CAD"
magenta = "#E18FBA"
cyan = "#D4A5B8"
white = "#c3c3c6"

[colors.bright]
black = "#5c5c71"
red = "#665C97"
green = "#7F71A4"
yellow = "#AA6B9E"
blue = "#D87CAD"
magenta = "#E18FBA"
cyan = "#D4A5B8"
white = "#c3c3c6"

[colors.dim]
black = "#c3c3c6"
red = "#665C97"
green = "#E18FBA"
yellow = "#AA6B9E"
blue = "#D87CAD"
magenta = "#7F71A4"
cyan = "#D4A5B8"
white = "#5c5c71"
