[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#10190b"
foreground = "#c3c5c2"

[colors.cursor]
text = "#10190b"
cursor = "#c3c5c2"

[colors.vi_mode_cursor]
text = "#10190b"
cursor = "#c3c5c2"

[colors.search.matches]
foreground = "#10190b"
background = "#c3c5c2"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#616e5a"
background = "#c3c5c2"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#10190b"
red = "#215161"
green = "#B6610F"
yellow = "#7A827B"
blue = "#BC8F5B"
magenta = "#216C88"
cyan = "#4B7B8C"
white = "#c3c5c2"

[colors.bright]
black = "#616e5a"
red = "#215161"
green = "#B6610F"
yellow = "#7A827B"
blue = "#BC8F5B"
magenta = "#216C88"
cyan = "#4B7B8C"
white = "#c3c5c2"

[colors.dim]
black = "#c3c5c2"
red = "#215161"
green = "#216C88"
yellow = "#7A827B"
blue = "#BC8F5B"
magenta = "#B6610F"
cyan = "#4B7B8C"
white = "#616e5a"
