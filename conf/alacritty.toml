[general]
import = ['~/.config/i3/conf/alacritty-padding.toml']

[window]
decorations="full"
dynamic_title=true
opacity = 1

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#0B0C0C"
foreground = "#c2c2c2"

[colors.cursor]
text = "#0B0C0C"
cursor = "#c2c2c2"

[colors.vi_mode_cursor]
text = "#0B0C0C"
cursor = "#c2c2c2"

[colors.search.matches]
foreground = "#0B0C0C"
background = "#c2c2c2"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#566a6a"
background = "#c2c2c2"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#0B0C0C"
red = "#4F6974"
green = "#6A6962"
yellow = "#AB5B49"
blue = "#97747F"
magenta = "#998D75"
cyan = "#5B7783"
white = "#c2c2c2"

[colors.bright]
black = "#566a6a"
red = "#4F6974"
green = "#6A6962"
yellow = "#AB5B49"
blue = "#97747F"
magenta = "#998D75"
cyan = "#5B7783"
white = "#c2c2c2"

[colors.dim]
black = "#c2c2c2"
red = "#4F6974"
green = "#998D75"
yellow = "#AB5B49"
blue = "#97747F"
magenta = "#6A6962"
cyan = "#5B7783"
white = "#566a6a"
