[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 15

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#1c1f24"
foreground = "#c6c7c8"

[colors.cursor]
text = "#1c1f24"
cursor = "#c6c7c8"

[colors.vi_mode_cursor]
text = "#1c1f24"
cursor = "#c6c7c8"

[colors.search.matches]
foreground = "#1c1f24"
background = "#c6c7c8"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#626b78"
background = "#c6c7c8"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#1c1f24"
red = "#4EB5B6"
green = "#4EB5B6"
yellow = "#6AC5C6"
blue = "#97A0A8"
magenta = "#DDA89A"
cyan = "#F1C8B8"
white = "#c6c7c8"

[colors.bright]
black = "#626b78"
red = "#4EB5B6"
green = "#4EB5B6"
yellow = "#6AC5C6"
blue = "#97A0A8"
magenta = "#DDA89A"
cyan = "#F1C8B8"
white = "#c6c7c8"

[colors.dim]
black = "#c6c7c8"
red = "#4EB5B6"
green = "#DDA89A"
yellow = "#6AC5C6"
blue = "#97A0A8"
magenta = "#4EB5B6"
cyan = "#F1C8B8"
white = "#626b78"
