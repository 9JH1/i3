[general]
import = ['~/.config/i3/conf/alacritty-extra.toml']

[window]
decorations="full"
dynamic_title=true

[font]
size = 20

[font.normal]
family='Mononoki Nerd Font'

[font.bold]
family='MonaspiceRN NFM'
style="bold"

[font.italic]
family='Mononoki Nerd Font'
style='italic'

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-c", "export ZDOTDIR=/home/_3hy/.config/i3/conf/ && zsh"]
[colors.primary]
background = "#07080F"
foreground = "#c1c1c3"

[colors.cursor]
text = "#07080F"
cursor = "#c1c1c3"

[colors.vi_mode_cursor]
text = "#07080F"
cursor = "#c1c1c3"

[colors.search.matches]
foreground = "#07080F"
background = "#c1c1c3"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#565969"
background = "#c1c1c3"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#07080F"
red = "#37536C"
green = "#44637B"
yellow = "#1F299B"
blue = "#4D6D8B"
magenta = "#3042C2"
cyan = "#5965E1"
white = "#c1c1c3"

[colors.bright]
black = "#565969"
red = "#37536C"
green = "#44637B"
yellow = "#1F299B"
blue = "#4D6D8B"
magenta = "#3042C2"
cyan = "#5965E1"
white = "#c1c1c3"

[colors.dim]
black = "#c1c1c3"
red = "#37536C"
green = "#3042C2"
yellow = "#1F299B"
blue = "#4D6D8B"
magenta = "#44637B"
cyan = "#5965E1"
white = "#565969"
