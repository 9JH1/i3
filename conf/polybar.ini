[colors]
color0=${xrdb:color0}
color1=${xrdb:color1}
color2=${xrdb:color2}
color3=${xrdb:color3}
color4=${xrdb:color4}
color5=${xrdb:color5}
color6=${xrdb:color6}
color7=${xrdb:color7}
color8=${xrdb:color8}
color9=${xrdb:color9}
color10=${xrdb:color10}
color11=${xrdb:color11}
color12=${xrdb:color12}
color13=${xrdb:color13}
color14=${xrdb:color14}
background = ${colors.color0}
background-alt = ${colors.color3}
foreground = ${colors.color3}
foreground-alt = ${colors.color2}
primary = ${colors.color5}
secondary = ${colors.color4}
alert = ${colors.color1}
disabled = ${colors.color5}
level0=${colors.color1}
level1=${colors.color2}
level2=${colors.color3}
level3=${colors.color4}

[bar/bar_main]
fixed-center = true
border-right-size = 10pt 
border-left-size = 10pt 
border-top-size = 5pt
radius = 10pt 
border-color = #00000000
modules-left = xworkspaces seperator polywins
modules-right = powermenu notify seperator ram seperator cpu space cpu_temp seperator systray seperator  date
height = 2.7%
padding = 1 
foreground = ${colors.foreground}
font-2 = "Material Icons:size=17;4.5"
font-1 = "MonaspiceRN NFM:style=Bold:size=13;2.5"
font-0 = "Mononoki Nerd Font:style=Regular:size=13;2,5"
background=${colors.background}
line-size = 2
[module/xworkspaces]
type = internal/xworkspaces
label-active = %{T2}%name%%{T-}
label-active-padding = 1
label-active-foreground = ${colors.foreground-alt}
label-active-underline = ${colors.primary}
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-underline = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-padding = 1
label-visible = %name%
workspace-count = 10
[module/cava]
type = custom/script
tail = true
exec = /home/$USER/.config/i3/src/cava.sh
format = <label>

format-font = 5
format-foreground = ${colors.color7}
label = %output%

[module/spotify]
type = custom/script
interval = 1
format = <label>
exec = /home/$USER/.config/i3/src/spotify.sh
;control players (optional)

[module/spotify_next]
type = custom/text
format = <label>
format-foreground = ${colors.color7} 
label = "%{T3}¯üä%{T-}"
click-left = dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next

[module/spotify_prev]
type = custom/text
format = <label>
format-foreground = ${colors.color7}
label = "%{T3}¯üà%{T-}"
click-left = dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous

[module/spotify_forward]
type = custom/text
format = <label>
label = "%{T3}¯üÿ%{T-}"
click-left = "/home/$USER/.config/i3/src/forward.sh"
[module/spotify_status]
interval = 1
type = custom/script
format = "%{T3}<label>%{T-}"
exec = python /home/$USER/.config/i3/src/status.py
click-left = playerctl --player=spotify play-pause

[module/spotify_backward]
type = custom/text
format = <label>
label = "%{T3}¯üø%{T-}"
click-left = "/home/$USER/.config/i3/src/backward.sh"
[module/audio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "%{T3}¯üÅ%{T-}"
label-muted-foreground = ${colors.color9}
label-volume-foreground= ${colors.color7}

[module/systray]
type = internal/tray
tray-spacing = 4pt
tray-size = 20

[module/date]
type = internal/date
interval = 1
format-foreground = ${colors.foreground-alt}
date = %{T2}%l:%M %p%{T-}
date-alt = %l:%M %p | %Y-%m-%d | %H:%M:%S

[module/space]
type = custom/text
content = " "
[module/seperator]
type = custom/text
format = <label>
format-foreground = ${colors.background-alt}
label = "%{T2} | %{T-}"

[module/polywins]
type = custom/script
exec = /home/$USER/.config/i3/src/window.sh 2>/dev/null
format = <label>
label = "%{T2}%output%%{T-}"  
label-padding = 1
tail = true

[module/cpu_temp]
type = custom/script
interval = 5
exec = sensors | grep "Package id 0:" | tr -d '+' | awk '{print $4}'

[module/cpu]
type=internal/cpu
interval = 5
warn-percentage = 40
label-warn = %{T2}!%percentage%%{T-}
format-warn = <label-warn> <ramp-coreload>
format-warn-foreground = ${colors.alert}
label = %percentage%%
format = <label> <ramp-coreload>
ramp-coreload-spacing = 0
ramp-coreload-0 = Ôûü
ramp-coreload-1 = Ôûé
ramp-coreload-2 = Ôûâ
ramp-coreload-3 = Ôûä
ramp-coreload-4 = Ôûà
ramp-coreload-5 = Ôûå
ramp-coreload-6 = Ôûç
ramp-coreload-7 = Ôûê

[module/ram]
type=internal/memory
interval=5
warn-percentage=95
label = %percentage_used%%
format = <bar-used>
label-warn = !%free% left
format-warn = <label-warn>
bar-used-indicator = 
bar-used-foreground-0 = ${colors.level0}
bar-used-foreground-1 = ${colors.level1}
bar-used-foreground-2 = ${colors.level2}
bar-used-foreground-3 = ${colors.level3}
format-warn-background = ${colors.alert}
bar-used-width = 10
bar-used-fill = ÔûÉ
bar-used-empty = ÔûÉ
bar-used-empty-foreground = ${colors.disabled}

[module/notify]
type=custom/script
exec="~/.config/i3/src/notify.sh"
interval=5
click-left = "dunstctl set-paused toggle"

