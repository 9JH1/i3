[colors]
color0=${xrdb:color0}
color1=${xrdb:color1}
color2=${xrdb:color2}
color3=${xrdb:color3}
color4=${xrdb:color4}
color5=${xrdb:color5}
color6=${xrdb:color6}
color7=${xrdb:color7}
color8=${xrdb:color8}
color9=${xrdb:color9}
color10=${xrdb:color10}
color11=${xrdb:color11}
color12=${xrdb:color12}
color13=${xrdb:color13}
color14=${xrdb:color14}
background = ${colors.color0}
background-alt = ${colors.color2}
foreground = ${colors.color7}
foreground-alt = ${colors.color8}
primary = ${colors.color5}
secondary = ${colors.color4}
alert = ${colors.color1}
disabled = ${colors.color5}

[bar/bar_main]
border-color = ${colors.primary}
border-size = 2
fixed-center = true
modules-center = spotify
modules-left = xworkspaces seperator polywins
modules-right = systray seperator spotify_prev spotify_status spotify_next seperator date
height = 3%
padding = 5
foreground = ${colors.foreground}
font-2 = "Material Icons:size=17;4.5"
font-1 ="Hack:style=Bold:size=13;2.5"
font-0 = "Hack:style=Regular:size=13;2,5"
background=${colors.background}
line-size = 2
[module/xworkspaces]
type = internal/xworkspaces
label-active = %{T2}%name%%{T-}
label-active-padding = 1
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-padding = 1
label-visible = %name%
workspace-count = 10
[module/cava]
type = custom/script
tail = true
exec = /home/$USER/.config/i3/src/cava.sh
format = <label>

format-font = 5
format-foreground = ${colors.color7}
label = %output%

[module/spotify]
type = custom/script
interval = 1
format = %{T2}<label>%{T-}
exec = /home/$USER/.config/i3/src/spotify.sh
;control players (optional)

[module/spotify_next]
type = custom/text
format = <label>
format-foreground = ${colors.color7} 
label = "%{T3}¯üä%{T-}"
click-left = dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next

[module/spotify_prev]
type = custom/text
format = <label>
format-foreground = ${colors.color7}
label = "%{T3}¯üà%{T-}"
click-left = dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous

[module/spotify_forward]
type = custom/text
format = <label>
label = "%{T3}¯üÿ%{T-}"
click-left = "/home/$USER/.config/i3/src/forward.sh"
[module/spotify_status]
interval = 1
type = custom/script
format = "%{T3}<label>%{T-}"
exec = python /home/$USER/.config/i3/src/status.py
click-left = playerctl --player=spotify play-pause

[module/spotify_backward]
type = custom/text
format = <label>
label = "%{T3}¯üø%{T-}"
click-left = "/home/$USER/.config/i3/src/backward.sh"
[module/audio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "%{T3}¯üÅ%{T-}"
label-muted-foreground = ${colors.color9}
label-volume-foreground= ${colors.color7}

[module/systray]
type = internal/tray
format-margin = 16pt
tray-spacing = 4pt
tray-size = 20

[module/date]
type = internal/date
interval = 1
format-foreground = ${colors.foreground-alt}
date = %{T2}%l:%M %p%{T-}
date-alt = %l:%M %p | %Y-%m-%d | %H:%M:%S

[module/email]
type = custom/script
exec = bar-gmail -f polybar
interval = 10

[module/suspend]
type = custom/text
format = <label>
format-foreground = ${colors.foreground-alt}
label = "%{T2}sleep%{T-}"
click-left = i3lock -c 000000 && systemctl suspend
[module/log_out]
type = custom/text
format = <label>
format-foreground = ${colors.foreground-alt}
label = "%{T2}quit%{T-}"
click-left = killall -q i3

[module/space]
type = custom/text
content = " "
[module/seperator]
type = custom/text
format = <label>
format-foreground = ${colors.background-alt}
label = "%{T2} | %{T-}"


[module/power_menu]
type = custom/text
format = <label>
format-foreground =${colors.accent_2}
label = "%{T3}¯ó¼%{T-}"
click-left = "i3lock & systemctl suspend"

[module/polywins]
type = custom/script
exec = /home/$USER/.config/i3/src/window.sh 2>/dev/null
format = <label>
label = "%{T2}%output%%{T-}"  
label-padding = 1
tail = true

[module/background]
type=custom/text
format = <label>
label = "%{T3}¯Çé%{T-}"
format-foreground=${colors.accent_3}
click-left = python background.py


[module/cpu]
type = internal/cpu
interval = 1
label = %{T3}´éê%{T-}%{T2} %percentage%%%{T-}

[module/cpu_temp]
type = custom/script
interval = 5
exec = sensors | grep "Package id 0:" | tr -d '+' | awk '{print $4}'

[module/memory]
label = %{T3}¯ò¢%{T-}%{T2} %percentage_used%%%{T-}
type = internal/memory
interval = 3
